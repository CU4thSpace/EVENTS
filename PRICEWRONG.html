
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920">
<title>Dollar Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Teko:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: transparent;
    display: flex;
    flex-direction: column;
  }

  .spacer {
    flex: 1;
    background: transparent;
  }

  .panels {
    width: 1920px;
    height: 180px;
    background: transparent;
    display: flex;
    flex-direction: row;
    gap: 12px;
    padding: 12px;
  }

  .panel {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 6px solid #DB0272;
    position: relative;
    cursor: pointer;
  }

  .panel:nth-child(1) { background: #6159A7; }
  .panel:nth-child(2) { background: #DB0272; }
  .panel:nth-child(3) { background: #6159A7; }

  .dollar-input {
    font-family: 'Teko', sans-serif;
    font-size: 110px;
    color: white;
    background: transparent;
    border: none;
    outline: none;
    text-align: center;
    width: 100%;
    text-shadow: 3px 4px 0px rgba(0,0,0,0.35);
    cursor: text;
    caret-color: white;
    letter-spacing: -2px;
    line-height: 1;
  }

  .dollar-input::placeholder {
    color: rgba(255,255,255,0.4);
  }

  .clear-btn {
    position: fixed;
    bottom: 8px;
    right: 16px;
    background: #6159A7;
    color: white;
    border: none;
    font-family: 'Teko', sans-serif;
    font-size: 20px;
    padding: 6px 20px;
    cursor: pointer;
    letter-spacing: 0.1em;
    border-radius: 3px;
    z-index: 100;
    transition: background 0.2s;
  }

  .clear-btn:hover { background: #4a4490; }

  .cleared-msg {
    position: fixed;
    bottom: 8px;
    right: 130px;
    font-family: 'Teko', sans-serif;
    font-size: 20px;
    color: #6159A7;
    opacity: 0;
    transition: opacity 0.4s;
    z-index: 100;
  }

  .cleared-msg.show { opacity: 1; }
</style>
</head>
<body>

<div class="spacer"></div>

<div class="panels">
  <div class="panel" onclick="this.querySelector('input').focus()">
    <input class="dollar-input" id="val1" type="text" placeholder="$0" maxlength="10" />
  </div>
  <div class="panel" onclick="this.querySelector('input').focus()">
    <input class="dollar-input" id="val2" type="text" placeholder="$0" maxlength="10" />
  </div>
  <div class="panel" onclick="this.querySelector('input').focus()">
    <input class="dollar-input" id="val3" type="text" placeholder="$0" maxlength="10" />
  </div>
</div>

<button class="clear-btn" onclick="clearValues()">CLEAR</button>
<div class="cleared-msg" id="clearedMsg">✓ CLEARED</div>

<script>
  const ids = ['val1', 'val2', 'val3'];
  ids.forEach(id => {
    const saved = localStorage.getItem(id);
    if (saved) document.getElementById(id).value = saved;
  });

  ids.forEach(id => {
    const input = document.getElementById(id);
    input.addEventListener('input', () => {
      let v = input.value.replace(/[^0-9]/g, '');
      if (v) input.value = '$' + parseInt(v, 10).toLocaleString();
      else input.value = '';
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') clearValues();
    });
  });

  function clearValues() {
    ids.forEach(id => {
      document.getElementById(id).value = '';
      localStorage.removeItem(id);
    });
    const msg = document.getElementById('clearedMsg');
    msg.classList.add('show');
    setTimeout(() => msg.classList.remove('show'), 2000);
  }
</script>
</body>
</html>
