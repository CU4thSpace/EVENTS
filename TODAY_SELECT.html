<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://use.typekit.net/paf7uxj.css">
<title>Kiosk Launcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0;
    font-family: "gill-sans-nova-condensed", sans-serif;
    background: #111;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }

  /* ── same container + border system as events page ── */
  .event-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 1920px;
    max-height: 1080px;
    aspect-ratio: 16/9;
    overflow: hidden;
    box-sizing: border-box;
  }

  @media (max-aspect-ratio: 16/9) {
    .event-container { width: 100vw; height: calc(100vw * 9 / 16); }
  }
  @media (min-aspect-ratio: 16/9) {
    .event-container { width: calc(100vh * 16 / 9); height: 100vh; }
  }

  .border-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 6px solid white;
    box-sizing: border-box;
    z-index: 1000;
    pointer-events: none;
  }

  .zoom-content {
    position: absolute;
    top: 6px; left: 6px;
    width: calc(100% - 12px);
    height: calc(100% - 12px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 5.2% 5.2% 9.3%;
  }

  /* ── clock — same as events page ── */
  #clock { display: none; }

  .hero-text { display: none; }

  /* ── key grid ── */
  .key-grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: clamp(6px, 1vw, 14px);
    width: calc(100% - 10.4%);
    height: calc(100% - 18.6%);
    z-index: 10;
  }

  .key {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    background: rgba(255,255,255,0.04);
    border: 3px solid rgba(255,255,255,0.85);
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
    overflow: hidden;
  }

  .key:hover {
    background: rgba(255,255,255,0.1);
    border-color: #fff;
  }

  .key.active {
    background: rgba(255,255,255,0.18);
    border-color: #fff;
    transform: scale(0.94);
  }

  .key-num {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(0.7rem, 1.6vw, 1.5rem);
    font-weight: bold;
    font-style: italic;
    color: #ccc;
    opacity: 0.5;
    position: absolute;
    top: 8px; left: 10px;
    line-height: 1;
  }

  .key-icon {
    font-size: clamp(1.2rem, 2.5vw, 2.4rem);
    line-height: 1;
    margin-top: 4px;
  }

  .key-name {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(0.7rem, 1.6vw, 1.5rem);
    font-weight: bold;
    color: #ccc;
    opacity: 0.9;
    text-align: center;
    padding: 0 6px;
    line-height: 1.1;
    letter-spacing: 0.04em;
  }

  /* unassigned */
  .key.empty {
    background: transparent;
    border: 1px dashed rgba(255,255,255,0.1);
    opacity: 0.3;
    cursor: default;
  }
  .key.empty:hover { background: transparent; border-color: rgba(255,255,255,0.1); transform: none; }

  /* ── status bar ── */
  .status-bar {
    position: absolute;
    bottom: 2%;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 10.4%);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    padding-top: clamp(4px, 0.5vw, 8px);
    border-top: 1px solid rgba(255,255,255,0.15);
  }

  .status-msg {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(0.6rem, 1.4vw, 1.3rem);
    font-weight: 100;
    font-style: italic;
    color: #ccc;
    opacity: 0.7;
    letter-spacing: 0.02em;
    transition: opacity 0.3s;
  }
  .status-msg.launching { opacity: 1; }

  .status-hint {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(0.55rem, 1.1vw, 1rem);
    color: #ccc;
    opacity: 0.4;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* ── launch overlay ── */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(17,17,17,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    z-index: 2000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }

  .overlay-label {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(1rem, 2.8vw, 2.8rem);
    font-weight: 100;
    font-style: italic;
    color: #ccc;
    opacity: 0.7;
    letter-spacing: 0.06em;
  }

  .overlay-url {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: clamp(1.2rem, 3.2vw, 3.2rem);
    font-weight: bold;
    color: #ccc;
    letter-spacing: 0.02em;
  }

  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #ccc;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* entrance animations */
  .key { animation: fadeUp 0.5s ease both; }
  .key:nth-child(1) { animation-delay: 0.05s; }
  .key:nth-child(2) { animation-delay: 0.10s; }
  .key:nth-child(3) { animation-delay: 0.15s; }
  .key:nth-child(4) { animation-delay: 0.20s; }
  .key:nth-child(5) { animation-delay: 0.25s; }
  .key:nth-child(6) { animation-delay: 0.30s; }
  .key:nth-child(7) { animation-delay: 0.35s; }
  .key:nth-child(8) { animation-delay: 0.40s; }
  .key:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="event-container">
  <div class="border-overlay"></div>

  <div id="clock">--:--:--</div>

  <div class="zoom-content">

    <!-- hero — bottom-left, mirrors event-overlay positioning -->
    <div class="hero-text">
      <div class="hero-label">Interactive Kiosk — 4th Space</div>
      <div class="hero-title">Select a destination</div>
      <div class="hero-sub">Press a key 1–9 on the keypad</div>
    </div>

    <!-- 3×3 key grid — right side -->
    <div class="key-grid" id="keyGrid"></div>

    <!-- status — below grid -->
    <div class="status-bar">
      <span class="status-msg" id="statusMsg">Awaiting keypress…</span>
      <span class="status-hint">Keys 1–9 · 0 = Home</span>
    </div>

  </div>
</div>

<!-- launch overlay -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-label">Launching</div>
  <div class="overlay-url" id="overlayUrl"></div>
</div>

<script>
  // ─── DESTINATIONS ─────────────────────────────────────────────────
  // Grid order: row 1 = 7,8,9 / row 2 = 4,5,6 / row 3 = 1,2,3
  const destinations = [
    { key: '7', name: 'YOUTUBE',      url: 'https://www.youtube.com/CU4thSpace',                      icon: '▶️' },
    { key: '8', name: 'INSTAGRAM',    url: 'https://www.instagram.com/cu4thspace/',                   icon: '📸' },
    { key: '9', name: 'SELECTOR',     url: 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html',  icon: '🗂️' },
    { key: '4', name: 'CONCORDIA',    url: 'https://www.concordia.ca/',                               icon: '🏛️' },
    { key: '5', name: 'CLOCK',        url: 'https://cu4thspace.github.io/EVENTS/LOCAL_CLOCK.html',   icon: '🕐' },
    { key: '6', name: 'LOWER THIRDS', url: 'https://cu4thspace.github.io/LOWERTHIRDS/L3byCSV.html',  icon: '📺' },
    { key: '1', name: 'TODAY',        url: 'https://cu4thspace.github.io/EVENTS/OBSCLOCKDATE',        icon: '📅' },
    { key: '2', name: 'COUNTDOWN',    url: 'https://cu4thspace.github.io/EVENTS/COUNTDOWN',           icon: '⏳' },
    { key: '3', name: '4th Space',    url: 'https://www.concordia.ca/next-gen/4th-space.html',        icon: '🎓' },
  ];
  // ──────────────────────────────────────────────────────────────────

  const grid      = document.getElementById('keyGrid');
  const statusMsg = document.getElementById('statusMsg');
  const overlay   = document.getElementById('overlay');
  const overlayUrl = document.getElementById('overlayUrl');
  const clockEl   = document.getElementById('clock');

  destinations.forEach((dest, i) => {
    const el = document.createElement('div');
    el.className = 'key' + (dest.url ? '' : ' empty');
    el.dataset.key = dest.key;
    if (dest.url) {
      el.innerHTML = `
        <span class="key-num">${dest.key}</span>
        <span class="key-icon">${dest.icon || '🔗'}</span>
        <span class="key-name">${dest.name}</span>
      `;
      el.addEventListener('click', () => triggerDestination(dest.key));
    } else {
      el.innerHTML = `<span class="key-num">${dest.key}</span>`;
    }
    grid.appendChild(el);
  });

  function triggerDestination(keyChar) {
    const dest = destinations.find(d => d.key === keyChar);
    if (!dest || !dest.url) return;

    const keyEl = grid.querySelector(`[data-key="${keyChar}"]`);
    if (keyEl) {
      keyEl.classList.add('active');
      setTimeout(() => keyEl.classList.remove('active'), 300);
    }

    statusMsg.textContent = 'Launching ' + dest.name + '…';
    statusMsg.classList.add('launching');
    overlayUrl.textContent = dest.url;
    overlay.classList.add('visible');

    setTimeout(() => { window.location.href = dest.url; }, 800);
  }

  document.addEventListener('keydown', (e) => {
    if (/^[1-9]$/.test(e.key)) triggerDestination(e.key);
    if (e.key === '0') {
      statusMsg.textContent = 'Returning to initial state…';
      statusMsg.classList.add('launching');
      overlayUrl.textContent = 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html';
      overlay.classList.add('visible');
      setTimeout(() => { window.location.href = 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html'; }, 800);
    }
  });

  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    clockEl.textContent = h + ':' + m + ':' + s;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
