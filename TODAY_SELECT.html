<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kiosk Launcher</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0c0f;
    --surface: #13161b;
    --border: rgba(255,255,255,0.07);
    --border-hover: rgba(255,255,255,0.18);
    --text-primary: #f0f2f5;
    --text-secondary: #7a8394;
    --text-muted: #3d4350;
    --accent: #4a7cff;
    --accent-dim: rgba(74,124,255,0.12);
    --accent-glow: rgba(74,124,255,0.25);
    --success: #22d3a0;
    --key-size: 110px;
    --key-radius: 16px;
    --transition: 0.18s cubic-bezier(0.4, 0, 0.2, 1);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'DM Sans', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  .scanlines {
    position: fixed; inset: 0; pointer-events: none; z-index: 100;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.03) 2px, rgba(0,0,0,0.03) 4px);
  }

  .layout {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    padding: 40px 60px;
    gap: 32px;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .brand {
    display: flex; align-items: center; gap: 14px;
  }
  .brand-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: var(--success);
    box-shadow: 0 0 10px var(--success);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .brand-label {
    font-size: 13px; letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--text-secondary); font-weight: 500;
  }
  .clock {
    font-family: 'DM Mono', monospace;
    font-size: 13px; color: var(--text-secondary);
    letter-spacing: 0.06em;
  }

  /* MAIN AREA */
  main {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 48px;
  }

  .hero-text {
    text-align: center;
  }
  .hero-text h1 {
    font-size: clamp(2rem, 4vw, 3.2rem);
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.1;
    color: var(--text-primary);
    margin-bottom: 10px;
  }
  .hero-text h1 strong {
    font-weight: 600;
    color: #fff;
  }
  .hero-text p {
    font-size: 15px; color: var(--text-secondary);
    letter-spacing: 0.02em;
  }

  /* KEY GRID */
  .key-grid {
    display: grid;
    grid-template-columns: repeat(3, var(--key-size));
    grid-template-rows: repeat(3, var(--key-size));
    gap: 14px;
  }

  .key {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--key-radius);
    cursor: pointer;
    transition: all var(--transition);
    overflow: hidden;
  }
  .key::before {
    content: '';
    position: absolute; inset: 0;
    background: var(--accent-dim);
    opacity: 0;
    transition: opacity var(--transition);
    border-radius: var(--key-radius);
  }
  .key:hover {
    border-color: var(--border-hover);
    transform: translateY(-2px);
  }
  .key:hover::before { opacity: 1; }

  .key.active {
    border-color: var(--accent);
    transform: scale(0.94);
    box-shadow: 0 0 0 3px var(--accent-glow), inset 0 0 20px var(--accent-dim);
  }
  .key.active::before { opacity: 1; }

  .key-num {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    position: absolute;
    top: 10px; left: 12px;
  }

  .key-icon {
    font-size: 22px;
    line-height: 1;
    margin-top: 8px;
  }

  .key-name {
    font-size: 10px;
    font-weight: 500;
    color: var(--text-secondary);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-align: center;
    padding: 0 8px;
    line-height: 1.2;
  }

  /* unassigned key */
  .key.empty {
    background: transparent;
    border-color: var(--text-muted);
    border-style: dashed;
    opacity: 0.35;
    cursor: default;
  }
  .key.empty:hover { transform: none; border-color: var(--text-muted); }
  .key.empty::before { display: none; }

  /* STATUS BAR */
  .status-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    min-height: 52px;
  }
  .status-left {
    display: flex; align-items: center; gap: 10px;
    font-size: 13px; color: var(--text-secondary);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-muted);
    transition: background 0.3s;
  }
  .status-dot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent); }
  .status-msg {
    font-size: 13px; color: var(--text-secondary);
    font-family: 'DM Mono', monospace; letter-spacing: 0.02em;
    transition: color 0.3s;
  }
  .status-msg.launching { color: var(--accent); }
  .status-hint {
    font-size: 11px; color: var(--text-muted); letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  /* OVERLAY during redirect */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(10,12,15,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    z-index: 200;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
    backdrop-filter: blur(4px);
  }
  .overlay.visible { opacity: 1; pointer-events: all; }
  .overlay-label {
    font-size: 14px; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--text-secondary);
  }
  .overlay-url {
    font-family: 'DM Mono', monospace;
    font-size: 18px; color: var(--accent);
    letter-spacing: 0.02em;
  }
  .spinner {
    width: 36px; height: 36px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* entrance animations */
  .key { animation: fadeUp 0.5s ease both; }
  .key:nth-child(1) { animation-delay: 0.05s; }
  .key:nth-child(2) { animation-delay: 0.1s; }
  .key:nth-child(3) { animation-delay: 0.15s; }
  .key:nth-child(4) { animation-delay: 0.2s; }
  .key:nth-child(5) { animation-delay: 0.25s; }
  .key:nth-child(6) { animation-delay: 0.3s; }
  .key:nth-child(7) { animation-delay: 0.35s; }
  .key:nth-child(8) { animation-delay: 0.4s; }
  .key:nth-child(9) { animation-delay: 0.45s; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="scanlines"></div>

<div class="layout">
  <header>
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-label">Interactive Kiosk</span>
    </div>
    <div class="clock" id="clock">--:--:--</div>
  </header>

  <main>
    <div class="hero-text">
      <h1>Press a key to <strong>launch</strong></h1>
      <p>Use the numeric keypad or tap a destination below</p>
    </div>

    <div class="key-grid" id="keyGrid"></div>

    <div class="status-bar">
      <div class="status-left">
        <div class="status-dot" id="statusDot"></div>
        <span class="status-msg" id="statusMsg">Awaiting keypress…</span>
      </div>
      <span class="status-hint">Keys 1–9 active</span>
    </div>
  </main>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-label">Launching</div>
  <div class="overlay-url" id="overlayUrl"></div>
</div>

<script>
  // ─── DESTINATIONS ─────────────────────────────────────────────────
  // Edit this list to change key assignments.
  // Keys 1-9 map to indices 0-8. Leave url: null for unassigned keys.
  const destinations = [
    { key: '1', name: 'Google',     url: 'https://www.google.com',     icon: '🔍' },
    { key: '2', name: 'CNN News',   url: 'https://www.cnn.com',        icon: '📰' },
    { key: '3', name: 'Concordia',  url: 'https://www.concordia.ca',   icon: '🎓' },
    { key: '4', name: null,         url: null,                         icon: null },
    { key: '5', name: null,         url: null,                         icon: null },
    { key: '6', name: null,         url: null,                         icon: null },
    { key: '7', name: null,         url: null,                         icon: null },
    { key: '8', name: null,         url: null,                         icon: null },
    { key: '9', name: null,         url: null,                         icon: null },
  ];
  // ──────────────────────────────────────────────────────────────────

  const grid = document.getElementById('keyGrid');
  const statusDot = document.getElementById('statusDot');
  const statusMsg = document.getElementById('statusMsg');
  const overlay = document.getElementById('overlay');
  const overlayUrl = document.getElementById('overlayUrl');
  const clockEl = document.getElementById('clock');

  // Build grid
  destinations.forEach((dest, i) => {
    const el = document.createElement('div');
    el.className = 'key' + (dest.url ? '' : ' empty');
    el.dataset.key = dest.key;
    if (dest.url) {
      el.innerHTML = `
        <span class="key-num">${dest.key}</span>
        <span class="key-icon">${dest.icon || '🔗'}</span>
        <span class="key-name">${dest.name}</span>
      `;
      el.addEventListener('click', () => triggerDestination(i));
    } else {
      el.innerHTML = `<span class="key-num">${dest.key}</span>`;
    }
    grid.appendChild(el);
  });

  function triggerDestination(index) {
    const dest = destinations[index];
    if (!dest || !dest.url) return;

    // Visual feedback
    const keyEl = grid.querySelectorAll('.key')[index];
    keyEl.classList.add('active');
    setTimeout(() => keyEl.classList.remove('active'), 300);

    statusDot.classList.add('active');
    statusMsg.textContent = `Launching ${dest.name}…`;
    statusMsg.classList.add('launching');

    overlayUrl.textContent = dest.url;
    overlay.classList.add('visible');

    // BrightSign uses window.location to navigate
    setTimeout(() => {
      window.location.href = dest.url;
    }, 800);
  }

  // Keyboard listener — handles numpad and top-row number keys
  document.addEventListener('keydown', (e) => {
    const digit = e.key; // '1'–'9' on both numpad and top row
    if (/^[1-9]$/.test(digit)) {
      const index = parseInt(digit) - 1;
      triggerDestination(index);
    }
  });

  // BrightSign serial/GPIO keypad events also fire as keydown with
  // standard keycodes — the listener above covers that.

  // Clock
  function updateClock() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,'0');
    const m = String(now.getMinutes()).padStart(2,'0');
    const s = String(now.getSeconds()).padStart(2,'0');
    clockEl.textContent = `${h}:${m}:${s}`;
  }
  updateClock();
  setInterval(updateClock, 1000);
</script>
</body>
</html>
