<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://use.typekit.net/paf7uxj.css">
<title>Kiosk Launcher</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    margin: 0;
    font-family: "gill-sans-nova-condensed", sans-serif;
    background: #111;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    user-select: none;
  }

  .event-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    max-width: 1920px;
    max-height: 1080px;
    aspect-ratio: 16/9;
    overflow: hidden;
    box-sizing: border-box;
  }
  @media (max-aspect-ratio: 16/9) {
    .event-container { width: 100vw; height: calc(100vw * 9 / 16); }
  }
  @media (min-aspect-ratio: 16/9) {
    .event-container { width: calc(100vh * 16 / 9); height: 100vh; }
  }

  .border-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    border: 6px solid white;
    box-sizing: border-box;
    z-index: 1000;
    pointer-events: none;
  }

  .inner {
    position: absolute;
    top: 6px; left: 6px;
    width: calc(100% - 12px);
    height: calc(100% - 12px);
    overflow: hidden;
  }

  .key-grid {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 12px;
    width: calc(100% - 40px);
    height: calc(100% - 60px);
    z-index: 10;
  }

  .key {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.04);
    border: 3px solid rgba(255,255,255,0.85);
    border-radius: 18px;
    cursor: pointer;
    transition: background 0.18s ease, border-color 0.18s ease, transform 0.12s ease;
    overflow: hidden;
    padding: 8px;
  }
  .key:hover { background: rgba(255,255,255,0.1); border-color: #fff; }
  .key.active { background: rgba(255,255,255,0.18); border-color: #fff; transform: scale(0.94); }

  .key-num {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-weight: bold;
    font-style: italic;
    color: #ccc;
    opacity: 0.45;
    position: absolute;
    top: 10px; left: 14px;
    line-height: 1;
  }

  .key-name {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-weight: bold;
    color: #ccc;
    opacity: 0.95;
    text-align: center;
    line-height: 1;
    letter-spacing: 0.04em;
    white-space: nowrap;
  }

  .status-bar {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: calc(100% - 52px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,0.15);
  }
  .status-msg {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: 22px;
    font-weight: 100;
    font-style: italic;
    color: #ccc;
    opacity: 0.7;
    letter-spacing: 0.02em;
    transition: opacity 0.3s;
  }
  .status-msg.launching { opacity: 1; }
  .status-hint {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: 18px;
    color: #ccc;
    opacity: 0.4;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .overlay {
    position: fixed; inset: 0;
    background: rgba(17,17,17,0.92);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px;
    z-index: 2000;
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.visible { opacity: 1; pointer-events: all; }
  .overlay-label {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: 48px;
    font-weight: 100;
    font-style: italic;
    color: #ccc;
    opacity: 0.7;
    letter-spacing: 0.06em;
  }
  .overlay-url {
    font-family: "gill-sans-nova-condensed", sans-serif;
    font-size: 36px;
    font-weight: bold;
    color: #ccc;
    letter-spacing: 0.02em;
  }
  .spinner {
    width: 40px; height: 40px;
    border: 2px solid rgba(255,255,255,0.15);
    border-top-color: #ccc;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .key { animation: fadeUp 0.45s ease both; }
  .key:nth-child(1) { animation-delay: 0.05s; }
  .key:nth-child(2) { animation-delay: 0.10s; }
  .key:nth-child(3) { animation-delay: 0.15s; }
  .key:nth-child(4) { animation-delay: 0.20s; }
  .key:nth-child(5) { animation-delay: 0.25s; }
  .key:nth-child(6) { animation-delay: 0.30s; }
  .key:nth-child(7) { animation-delay: 0.35s; }
  .key:nth-child(8) { animation-delay: 0.40s; }
  .key:nth-child(9) { animation-delay: 0.45s; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="event-container">
  <div class="border-overlay"></div>
  <div class="inner">
    <div class="key-grid" id="keyGrid"></div>
    <div class="status-bar">
      <span class="status-msg" id="statusMsg">Awaiting keypress…</span>
      <span class="status-hint">Keys 1–9 · 0 = Home</span>
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-label">Launching</div>
  <div class="overlay-url" id="overlayUrl"></div>
</div>

<!-- Focus trap: BrightSign only fires key events on a focused element -->
<input id="keyTrap" type="text" autocomplete="off"
  style="position:fixed;opacity:0;width:1px;height:1px;top:0;left:0;border:none;outline:none;pointer-events:none;" />

<script>
  // ─── DESTINATIONS ─────────────────────────────────────────────────
  // Grid order: row 1 = 7,8,9 / row 2 = 4,5,6 / row 3 = 1,2,3
  var destinations = [
    { key: '7', name: 'YOUTUBE',      url: 'https://www.youtube.com/CU4thSpace'                     },
    { key: '8', name: 'INSTAGRAM',    url: 'https://www.instagram.com/cu4thspace/'                  },
    { key: '9', name: 'SELECTOR',     url: 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html' },
    { key: '4', name: 'CONCORDIA',    url: 'https://www.concordia.ca/'                              },
    { key: '5', name: 'CLOCK',        url: 'https://cu4thspace.github.io/EVENTS/LOCAL_CLOCK.html'  },
    { key: '6', name: 'LOWER THIRDS', url: 'https://cu4thspace.github.io/LOWERTHIRDS/L3byCSV.html' },
    { key: '1', name: 'TODAY',        url: 'https://cu4thspace.github.io/EVENTS/OBSCLOCKDATE'       },
    { key: '2', name: 'COUNTDOWN',    url: 'https://cu4thspace.github.io/EVENTS/COUNTDOWN'          },
    { key: '3', name: '4TH SPACE',    url: 'https://www.concordia.ca/next-gen/4th-space.html'       },
  ];

  // BrightSign XD1034 numpad keycodes (ASCII codes 48–57)
  // keycode 48 = 0, 49 = 1, 50 = 2, 51 = 3, 52 = 4,
  // keycode 53 = 5, 54 = 6, 55 = 7, 56 = 8, 57 = 9
  var KEYCODE_MAP = {
    48: '0', 49: '1', 50: '2', 51: '3', 52: '4',
    53: '5', 54: '6', 55: '7', 56: '8', 57: '9'
  };

  var grid       = document.getElementById('keyGrid');
  var statusMsg  = document.getElementById('statusMsg');
  var overlay    = document.getElementById('overlay');
  var overlayUrl = document.getElementById('overlayUrl');
  var trap       = document.getElementById('keyTrap');

  // ── Build buttons ──
  destinations.forEach(function(dest) {
    var el = document.createElement('div');
    el.className = 'key';
    el.dataset.key = dest.key;
    el.innerHTML = '<span class="key-num">' + dest.key + '</span><span class="key-name">' + dest.name + '</span>';
    el.addEventListener('click', function() { triggerDestination(dest.key); });
    grid.appendChild(el);
  });

  // ── Fit text to each cell ──
  function fitTextToCell(nameEl, numEl, cell) {
    var padX = 24, padY = 60;
    var maxW = cell.offsetWidth  - padX;
    var maxH = cell.offsetHeight - padY;
    var lo = 10, hi = 600, best = lo;
    while (lo <= hi) {
      var mid = Math.floor((lo + hi) / 2);
      nameEl.style.fontSize = mid + 'px';
      if (nameEl.scrollWidth <= maxW && nameEl.scrollHeight <= maxH) { best = mid; lo = mid + 1; }
      else { hi = mid - 1; }
    }
    nameEl.style.fontSize = best + 'px';
    numEl.style.fontSize = Math.max(16, Math.round(best * 0.30)) + 'px';
  }

  function fitAllKeys() {
    grid.querySelectorAll('.key').forEach(function(cell) {
      var nameEl = cell.querySelector('.key-name');
      var numEl  = cell.querySelector('.key-num');
      if (nameEl && numEl) fitTextToCell(nameEl, numEl, cell);
    });
  }
  window.addEventListener('load', fitAllKeys);
  window.addEventListener('resize', fitAllKeys);
  setTimeout(fitAllKeys, 300);
  setTimeout(fitAllKeys, 800);

  // ── Trigger destination ──
  function triggerDestination(keyChar) {
    var dest = null;
    for (var i = 0; i < destinations.length; i++) {
      if (destinations[i].key === keyChar) { dest = destinations[i]; break; }
    }
    if (!dest || !dest.url) return;

    var keyEl = grid.querySelector('[data-key="' + keyChar + '"]');
    if (keyEl) {
      keyEl.classList.add('active');
      setTimeout(function() { keyEl.classList.remove('active'); }, 300);
    }
    statusMsg.textContent = 'Launching ' + dest.name + '\u2026';
    statusMsg.classList.add('launching');
    overlayUrl.textContent = dest.url;
    overlay.classList.add('visible');
    setTimeout(function() { window.location.href = dest.url; }, 800);
  }

  // ── Focus trap ──
  function reFocus() {
    try { trap.focus({ preventScroll: true }); } catch(e) {}
  }
  reFocus();
  document.addEventListener('click', reFocus);
  document.addEventListener('focusout', function() { setTimeout(reFocus, 50); });
  window.addEventListener('load', reFocus);
  setTimeout(reFocus, 300);
  setTimeout(reFocus, 800);
  setTimeout(reFocus, 2000);

  // ── Key handler ──
  // BrightSign XD1034 reports numpad digits via a bare `keycode` property
  // (not the standard event.keyCode). We check all known locations.
  function handleKey(e) {
    var digit = null;

    // 1. BrightSign-specific: bare keycode property on the event object
    var bsCode = e.keycode !== undefined ? e.keycode : null;
    if (bsCode !== null && KEYCODE_MAP[bsCode] !== undefined) {
      digit = KEYCODE_MAP[bsCode];
    }

    // 2. Standard event.keyCode (same ASCII values, kept as fallback)
    if (digit === null && KEYCODE_MAP[e.keyCode] !== undefined) {
      digit = KEYCODE_MAP[e.keyCode];
    }

    // 3. Standard event.key single-digit string
    if (digit === null && e.key && /^[0-9]$/.test(e.key)) {
      digit = e.key;
    }

    // 4. event.code: Digit0–Digit9 or Numpad0–Numpad9
    if (digit === null && e.code && /^(Digit|Numpad)([0-9])$/.test(e.code)) {
      digit = e.code.slice(-1);
    }

    if (digit === null) return;

    if (digit === '0') {
      statusMsg.textContent = 'Returning home\u2026';
      statusMsg.classList.add('launching');
      overlayUrl.textContent = 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html';
      overlay.classList.add('visible');
      setTimeout(function() { window.location.href = 'https://cu4thspace.github.io/EVENTS/TODAY_SELECT.html'; }, 800);
    } else {
      triggerDestination(digit);
    }
  }

  // Attach to every event type that BrightSign might use
  ['keydown', 'keypress', 'keyup'].forEach(function(type) {
    trap.addEventListener(type, handleKey);
    document.addEventListener(type, handleKey);
  });

  // input fallback: character arrived but key events were suppressed
  trap.addEventListener('input', function() {
    var val = trap.value.replace(/\D/g, '');
    trap.value = '';
    if (val) handleKey({ keycode: undefined, keyCode: 0, key: val.slice(-1), code: '' });
  });
</script>
</body>
</html>
