<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://use.typekit.net/paf7uxj.css">
  <title>Concordia 4th Space Events — Square</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "gill-sans-nova-condensed", sans-serif;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ── zoom controls ── */
    #zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    .zoom-button {
      font-size: 2rem;
      color: white;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      line-height: 1;
      text-align: center;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .zoom-button:hover  { background: rgba(255,255,255,0.4); }
    .zoom-button:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ── square container — always 1080×1080 logical px, scaled to fit viewport ── */
    .event-container {
      position: relative;
      width:  1080px;
      height: 1080px;
      overflow: hidden;
      /* Scale to fit the viewport while keeping crisp 1:1 pixel mapping */
      transform-origin: center center;
    }

    .border-overlay {
      position: absolute;
      inset: 0;
      border: 6px solid white;
      z-index: 1000;
      pointer-events: none;
    }

    .zoom-content {
      position: absolute;
      top: 6px; left: 6px;
      width:  calc(100% - 12px);
      height: calc(100% - 12px);
      overflow: hidden;
    }

    /* ── individual event slide ── */
    .event {
      position: absolute;
      inset: 0;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      z-index: 0;
      transition: opacity 2s ease-in-out;
    }
    .event.visible { opacity: 1; z-index: 1; }

    .event::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 0;
    }

    /* ── text overlay — anchored to bottom-left, same proportional padding as original ── */
    .event-overlay {
      position: absolute;
      inset: 0;
      z-index: 1;
      transform-origin: 5.2% 44.4%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      /* 5.2% of 1080 ≈ 56px left; 9.3% of 1080 ≈ 100px bottom */
      padding-left: 5.2%;
      padding-bottom: 9.3%;
      padding-right: 5.2%;
      gap: 1rem;
    }

    .event-date {
      max-width: 78%;
      font-size: 1.85rem;   /* ≈ 2.25vw @ 16/9 but recalculated for 1080-sq */
      font-weight: 100;
      font-style: italic;
      line-height: 1;
      opacity: 0.9;
      color: #ccc;
      letter-spacing: 0.02em;
    }

    .event-title {
      max-width: 78%;
      font-size: 6.5rem;    /* ≈ 7.5vw @ 16/9 equivalent */
      font-weight: bold;
      line-height: 1;
      color: #ccc;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .event-description {
      max-width: 78%;
      font-size: 2.6rem;
      line-height: 1;
      opacity: 0.9;
      color: #ccc;
    }

    /* ── clock — same position but in square space ── */
    #clock {
      position: absolute;
      top: 9%;
      left: 50%;
      transform: translateX(-50%);
      font-size: 5rem;
      color: #ccc;
      z-index: 9999;
      font-family: "gill-sans-nova-condensed", sans-serif;
      font-weight: lighter;
      white-space: nowrap;
    }

    #loadingSpinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2rem;
      font-family: sans-serif;
    }

    .emoji-eye {
      display: inline-block;
      width: 1em; height: auto;
      vertical-align: middle;
      object-fit: contain;
      line-height: 1;
    }

    .no-break-look {
      white-space: nowrap !important;
      display: inline-block;
      word-break: keep-all;
      overflow-wrap: normal;
    }
  </style>
</head>
<body>

  <div id="loadingSpinner">Loading events…</div>

  <div class="event-container" id="eventContainer">
    <div class="border-overlay"></div>
    <div id="clock"></div>
    <div class="zoom-content" id="zoomContent"></div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-button" onclick="location.reload()"          title="Reload">←</button>
    <button class="zoom-button" onclick="nextEvent()"                title="Next event">→</button>
    <button class="zoom-button" onclick="changeZoom(-0.1)"           title="Zoom out">−</button>
    <button class="zoom-button" onclick="changeZoom(0.1)"            title="Zoom in">+</button>
    <button class="zoom-button" id="linkBtn" onclick="openCurrentEventLink()" title="Open event page">∗</button>
    <button class="zoom-button" id="saveBtn" onclick="saveAsPng()"   title="Save as PNG">⬇</button>
    <button class="zoom-button" id="wrapBtn" onclick="cycleTitleWidth()" title="Cycle title width">↵</button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    /* ─────────────────────────────────────────────
       Scale the 1080×1080 container to fill the
       viewport without distortion.
    ───────────────────────────────────────────── */
    function fitContainer() {
      const c = document.getElementById('eventContainer');
      const scale = Math.min(window.innerWidth / 1080, window.innerHeight / 1080);
      c.style.transform = `scale(${scale})`;
    }
    fitContainer();
    window.addEventListener('resize', fitContainer);

    /* ─────────────────────────────────────────────
       State
    ───────────────────────────────────────────── */
    let zoomLevel = 1;
    let currentEventIndex = 0;
    let allEvents = [];

    /* ─────────────────────────────────────────────
       Overlay text zoom (independent of container scale)
    ───────────────────────────────────────────── */
    function changeZoom(delta) {
      zoomLevel = Math.min(Math.max(zoomLevel + delta, 0.5), 2);
      document.querySelectorAll('.event-overlay').forEach(o => {
        o.style.transform = `scale(${zoomLevel})`;
      });
    }

    /* ─────────────────────────────────────────────
       Navigation
    ───────────────────────────────────────────── */
    function nextEvent() {
      if (!allEvents.length) return;
      allEvents[currentEventIndex].classList.remove('visible');
      currentEventIndex = (currentEventIndex + 1) % allEvents.length;
      allEvents[currentEventIndex].classList.add('visible');
      updateLinkButton();
    }

    function previousEvent() {
      if (!allEvents.length) return;
      allEvents[currentEventIndex].classList.remove('visible');
      currentEventIndex = (currentEventIndex - 1 + allEvents.length) % allEvents.length;
      allEvents[currentEventIndex].classList.add('visible');
      updateLinkButton();
    }

    function openCurrentEventLink() {
      const url = allEvents[currentEventIndex]?.dataset?.link;
      if (url) window.open(url, '_blank');
    }

    function updateLinkButton() {
      const btn = document.getElementById('linkBtn');
      const url = allEvents[currentEventIndex]?.dataset?.link;
      btn.disabled = !url;
      btn.title = url ? `Open: ${url}` : 'No link';
    }

    /* ─────────────────────────────────────────────
       Title max-width cycling
    ───────────────────────────────────────────── */
    const widthPresets = [
      { label: '78%', value: '78%' },
      { label: '55%', value: '55%' },
      { label: '40%', value: '40%' },
      { label: '95%', value: '95%' },
    ];
    let widthIndex = 0;

    function cycleTitleWidth() {
      widthIndex = (widthIndex + 1) % widthPresets.length;
      const { value, label } = widthPresets[widthIndex];
      document.querySelectorAll('.event-title').forEach(t => {
        t.style.maxWidth = value;
      });
      const btn = document.getElementById('wrapBtn');
      btn.title = `Title width: ${label} (click to cycle)`;
    }

    /* Keyboard / Logitech remote */
    document.addEventListener('keydown', e => {
      if      (e.key === 'ArrowRight' || e.key === 'PageDown') { e.preventDefault(); nextEvent(); }
      else if (e.key === 'ArrowLeft'  || e.key === 'PageUp')   { e.preventDefault(); location.reload(); }
    });

    /* ─────────────────────────────────────────────
       Helpers
    ───────────────────────────────────────────── */
    function parseEventTime(timeString) {
      try {
        const m = timeString.match(/(\w+)\s+(\d{1,2}),\s+(\d{4})/);
        if (!m) return null;
        const monthMap = {January:0,February:1,March:2,April:3,May:4,June:5,
                          July:6,August:7,September:8,October:9,November:10,December:11};
        return new Date(parseInt(m[3]), monthMap[m[1]], parseInt(m[2]));
      } catch { return null; }
    }

    function processTitleWithEyes(title) {
      const eyeImg = '<img src="https://raw.githubusercontent.com/CU4thSpace/EVENTS/main/emoji-eyes.png" alt="👀" class="emoji-eye">';
      return title
        .replace(/L👀[kK]:/g, m => `<span class="no-break-look">L${eyeImg}${m.slice(-2)}</span>`)
        .replace(/L👀[kK]/g,  m => `<span class="no-break-look">L${eyeImg}${m.slice(-1)}</span>`)
        .replace(/:\s+/g, ':<br>');
    }

    /* ─────────────────────────────────────────────
       Fetch & render
    ───────────────────────────────────────────── */
    async function fetchAndDisplayEvents() {
      const response = await fetch(
        'https://www.concordia.ca/content/concordia/en/next-gen/4th-space/programming/RSSCAL/_jcr_content/content-main/grid_container_671899525/grid-container-parsys/events_list.xml',
        { cache: 'no-store' }
      );
      const text = await response.text();
      const xml  = new DOMParser().parseFromString(text, 'application/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const zoomContent = document.getElementById('zoomContent');
      zoomContent.innerHTML = '';

      const imagePromises = [];
      const eventDivs = [];

      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || 'Untitled';
        const descRaw = item.querySelector('description')?.textContent || '';

        let itemLink = item.querySelector('link')?.textContent?.trim()
                    || item.querySelector('guid')?.textContent?.trim()
                    || '';

        const tmp = document.createElement('div');
        tmp.innerHTML = descRaw;
        const imgEl = tmp.querySelector('img');
        const imageUrl = imgEl ? imgEl.src : 'https://via.placeholder.com/300';

        const descTime = tmp.querySelector('p')?.textContent?.trim() || '';
        let eventDate  = parseEventTime(descTime);
        if (!eventDate) {
          const pub = item.querySelector('pubDate')?.textContent;
          eventDate  = pub ? new Date(pub) : new Date();
        }

        /* Build slide */
        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
        eventDiv.style.backgroundImage = `url("${imageUrl}")`;
        if (itemLink) eventDiv.dataset.link = itemLink;

        const overlay = document.createElement('div');
        overlay.className = 'event-overlay';

        const dateDiv = document.createElement('div');
        dateDiv.className = 'event-date';
        dateDiv.textContent = eventDate.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric'});
        overlay.appendChild(dateDiv);

        const titleDiv = document.createElement('div');
        titleDiv.className = 'event-title';
        titleDiv.innerHTML = processTitleWithEyes(title);
        /* Shrink very long titles */
        if (title.length > 25) {
          const s = Math.max(0.7, 25 / title.length);
          titleDiv.style.fontSize = `${6.5 * s}rem`;
        }
        overlay.appendChild(titleDiv);

        eventDiv.appendChild(overlay);
        zoomContent.appendChild(eventDiv);
        eventDivs.push(eventDiv);

        const imgLoader = new Image();
        imagePromises.push(new Promise(res => {
          imgLoader.onload = imgLoader.onerror = res;
          imgLoader.src = imageUrl;
        }));
      });

      await Promise.all(imagePromises);
      document.getElementById('loadingSpinner').style.display = 'none';

      allEvents = eventDivs;
      currentEventIndex = 0;
      if (eventDivs.length) eventDivs[0].classList.add('visible');

      document.querySelectorAll('.event-overlay').forEach(o => {
        o.style.transform = `scale(${zoomLevel})`;
      });
      updateLinkButton();
    }

    /* ─────────────────────────────────────────────
       PNG export — captures the raw 1080×1080 container
       (controls & clock hidden, container temporarily
        un-scaled so html2canvas sees 1080px exactly)
    ───────────────────────────────────────────── */
    async function saveAsPng() {
      const saveBtn  = document.getElementById('saveBtn');
      const controls = document.getElementById('zoom-controls');
      const clock    = document.getElementById('clock');
      const container = document.getElementById('eventContainer');

      saveBtn.disabled = true;
      saveBtn.textContent = '…';
      controls.style.display = 'none';
      clock.style.display    = 'none';

      /* Remove viewport scaling so html2canvas sees native 1080px */
      const prevTransform = container.style.transform;
      container.style.transform = 'none';

      try {
        const canvas = await html2canvas(container, {
          useCORS: true,
          allowTaint: false,
          scale: 1,           /* 1 px = 1 canvas px → exact 1080×1080 output */
          width: 1080,
          height: 1080,
          backgroundColor: '#111',
          logging: false,
          imageTimeout: 10000,
        });

        const titleText = allEvents[currentEventIndex]
          ?.querySelector('.event-title')?.innerText || 'event';
        const safeName = titleText
          .replace(/[^a-z0-9]/gi,'_').replace(/_+/g,'_').toLowerCase().slice(0,50);

        const a = document.createElement('a');
        a.download = `4thspace_${safeName}.png`;
        a.href = canvas.toDataURL('image/png');
        a.click();
      } catch (err) {
        console.error('PNG export failed:', err);
        alert('Export failed — see console for details.');
      } finally {
        container.style.transform = prevTransform;
        controls.style.display    = '';
        clock.style.display       = '';
        saveBtn.disabled = false;
        saveBtn.textContent = '⬇';
      }
    }

    /* ─────────────────────────────────────────────
       Boot
    ───────────────────────────────────────────── */
    fetchAndDisplayEvents();
    setInterval(fetchAndDisplayEvents, 6 * 60 * 60 * 1000);

    function updateClock() {
      const n = new Date();
      document.getElementById('clock').textContent =
        [n.getHours(), n.getMinutes(), n.getSeconds()]
          .map(v => String(v).padStart(2,'0')).join(':');
    }
    setInterval(updateClock, 1000);
    updateClock();
  </script>
</body>
</html>
