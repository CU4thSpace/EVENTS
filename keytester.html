<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BrightSign Keycode Test</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: monospace;
      color: #fff;
      gap: 60px;
    }

    h1 {
      font-size: 2.5rem;
      font-weight: normal;
      letter-spacing: 0.1em;
      color: #aaa;
      text-transform: uppercase;
    }

    /* 3-key row layout: 4 | 2·6·8 | (none, just the four keys) */
    .keypad {
      display: grid;
      grid-template-columns: repeat(3, 180px);
      grid-template-rows: repeat(3, 180px);
      gap: 20px;
    }

    .key {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 4px solid #444;
      border-radius: 16px;
      background: #1e1e1e;
      transition: background 0.1s, border-color 0.1s, transform 0.1s;
      gap: 12px;
    }

    .key.active {
      background: #2E3092;
      border-color: #fff;
      transform: scale(0.95);
    }

    .key-number {
      font-size: 4rem;
      font-weight: bold;
      line-height: 1;
    }

    .key-label {
      font-size: 1rem;
      color: #aaa;
      text-align: center;
      line-height: 1.3;
    }

    .key.active .key-label {
      color: #ccc;
    }

    /* grid positions — numpad layout: 7 8 9 / 4 5 6 / 1 2 3 */
    /* we only show 2, 4, 6, 8 — place them in numpad positions */
    .key-8 { grid-column: 2; grid-row: 1; }
    .key-4 { grid-column: 1; grid-row: 2; }
    .key-6 { grid-column: 3; grid-row: 2; }
    .key-2 { grid-column: 2; grid-row: 3; }

    /* live readout */
    #readout {
      font-size: 1.8rem;
      color: #555;
      letter-spacing: 0.05em;
      height: 2.5rem;
      transition: color 0.2s;
    }

    #readout.active {
      color: #0f0;
    }

    /* focus trap — invisible */
    #focusTrap {
      position: fixed;
      opacity: 0;
      width: 1px;
      height: 1px;
      top: 0;
      left: 0;
      border: none;
      outline: none;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <input id="focusTrap" type="text" readonly tabindex="0" aria-hidden="true" />

  <h1>BrightSign Keycode Test</h1>

  <div class="keypad">
    <div class="key key-8" id="key-56">
      <div class="key-number">8</div>
      <div class="key-label">keycode 56<br>→ Events</div>
    </div>
    <div class="key key-4" id="key-52">
      <div class="key-number">4</div>
      <div class="key-label">keycode 52<br>← Previous</div>
    </div>
    <div class="key key-6" id="key-54">
      <div class="key-number">6</div>
      <div class="key-label">keycode 54<br>→ Next</div>
    </div>
    <div class="key key-2" id="key-50">
      <div class="key-number">2</div>
      <div class="key-label">keycode 50<br>↺ Reload</div>
    </div>
  </div>

  <div id="readout">waiting for keypress…</div>

  <script>
    const focusTrap = document.getElementById('focusTrap');
    const readout   = document.getElementById('readout');

    function reFocus() {
      focusTrap.focus({ preventScroll: true });
    }
    reFocus();
    document.addEventListener('click', reFocus);
    focusTrap.addEventListener('blur', reFocus);

    // Map every keycode we care about to its tile id
    const keyMap = {
      50: 'key-50',
      52: 'key-52',
      54: 'key-54',
      56: 'key-56'
    };

    let clearTimer = null;

    document.addEventListener('keydown', function(e) {
      // Log everything so you can inspect unexpected codes in the browser console
      console.log('keydown — e.keycode:', e.keycode,
                  '| e.keyCode:', e.keyCode,
                  '| e.key:', e.key,
                  '| e.which:', e.which);

      const code = Number(e.keycode);   // BrightSign sends this as a string
      const tileId = keyMap[code];

      // Update readout
      readout.textContent = `keycode: ${e.keycode}  |  keyCode: ${e.keyCode}  |  key: "${e.key}"`;
      readout.classList.add('active');

      // Light up the matching tile, if any
      document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
      if (tileId) {
        document.getElementById(tileId).classList.add('active');
      }

      // Clear highlight after 800 ms
      clearTimeout(clearTimer);
      clearTimer = setTimeout(() => {
        document.querySelectorAll('.key').forEach(k => k.classList.remove('active'));
        readout.classList.remove('active');
        readout.textContent = 'waiting for keypress…';
      }, 800);
    });
  </script>

</body>
</html>
