<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Key Diagnostic</title>
<style>
  body {
    margin: 0;
    background: #111;
    color: #ccc;
    font-family: monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    overflow: hidden;
  }

  h1 {
    font-size: 2rem;
    font-weight: normal;
    margin-bottom: 0.5em;
    color: #fff;
  }

  p {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 3em;
  }

  #display {
    background: #1a1a1a;
    border: 2px solid #444;
    border-radius: 12px;
    padding: 40px 60px;
    text-align: center;
    min-width: 600px;
  }

  .row {
    display: flex;
    justify-content: space-between;
    gap: 40px;
    margin: 12px 0;
    font-size: 1.4rem;
  }

  .label {
    color: #666;
    text-align: right;
    min-width: 120px;
  }

  .value {
    color: #4af;
    text-align: left;
    min-width: 220px;
    font-weight: bold;
  }

  #bigKey {
    font-size: 6rem;
    font-weight: bold;
    color: #fff;
    margin: 30px 0 10px;
    min-height: 1.2em;
    letter-spacing: 0.05em;
  }

  #log {
    margin-top: 40px;
    width: 700px;
    max-height: 200px;
    overflow-y: auto;
    font-size: 0.95rem;
    color: #666;
    border-top: 1px solid #333;
    padding-top: 12px;
  }

  .log-entry { margin: 4px 0; }
  .log-entry span { color: #4af; }

  /* focus trap — invisible but present */
  #trap {
    position: fixed;
    opacity: 0;
    width: 1px;
    height: 1px;
    top: 0; left: 0;
    border: none;
    outline: none;
  }
</style>
</head>
<body>

<h1>BrightSign Key Diagnostic</h1>
<p>Press any key on the keypad — all values will appear below</p>

<div id="display">
  <div id="bigKey">—</div>
  <div class="row"><span class="label">event.key</span>     <span class="value" id="eKey">—</span></div>
  <div class="row"><span class="label">event.code</span>    <span class="value" id="eCode">—</span></div>
  <div class="row"><span class="label">event.keyCode</span> <span class="value" id="eKeyCode">—</span></div>
  <div class="row"><span class="label">event.which</span>   <span class="value" id="eWhich">—</span></div>
  <div class="row"><span class="label">event.charCode</span><span class="value" id="eCharCode">—</span></div>
  <div class="row"><span class="label">event type</span>    <span class="value" id="eType">—</span></div>
</div>

<div id="log"><em>Last 10 keypresses will appear here…</em></div>

<input id="trap" type="text" autocomplete="off" />

<script>
  var trap     = document.getElementById('trap');
  var logEl    = document.getElementById('log');
  var entries  = [];

  function reFocus() {
    try { trap.focus({ preventScroll: true }); } catch(e) {}
  }
  reFocus();
  document.addEventListener('click', reFocus);
  document.addEventListener('focusout', function() { setTimeout(reFocus, 50); });
  setTimeout(reFocus, 300);
  setTimeout(reFocus, 1000);
  setTimeout(reFocus, 3000);

  function showKey(e) {
    document.getElementById('bigKey').textContent     = e.key || '(empty)';
    document.getElementById('eKey').textContent       = JSON.stringify(e.key);
    document.getElementById('eCode').textContent      = JSON.stringify(e.code);
    document.getElementById('eKeyCode').textContent   = e.keyCode;
    document.getElementById('eWhich').textContent     = e.which;
    document.getElementById('eCharCode').textContent  = e.charCode;
    document.getElementById('eType').textContent      = e.type;

    var entry = e.type + ' | key=' + JSON.stringify(e.key) + ' code=' + JSON.stringify(e.code) + ' keyCode=' + e.keyCode;
    entries.unshift(entry);
    if (entries.length > 10) entries.pop();
    logEl.innerHTML = entries.map(function(s) {
      return '<div class="log-entry"><span>' + s + '</span></div>';
    }).join('');
  }

  // Listen to everything on both document and trap
  ['keydown', 'keypress', 'keyup'].forEach(function(type) {
    trap.addEventListener(type, showKey);
    document.addEventListener(type, showKey);
  });

  // input fallback
  trap.addEventListener('input', function() {
    var val = trap.value;
    trap.value = '';
    if (val) showKey({ type: 'input', key: val, code: '', keyCode: 0, which: 0, charCode: 0 });
  });
</script>
</body>
</html>
