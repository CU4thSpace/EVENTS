<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="https://use.typekit.net/paf7uxj.css">
  <title>Concordia 4th Space Events</title>
  <style>
    body {
      margin: 0;
      font-family: "gill-sans-nova-condensed", sans-serif;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    #zoom-controls {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9999;
      display: flex;
      gap: 10px;
    }

    .zoom-button {
      font-size: 2rem;
      color: white;
      background: rgba(255,255,255,0.2);
      border: none;
      border-radius: 8px;
      width: 50px;
      height: 50px;
      cursor: pointer;
      line-height: 1;
      text-align: center;
    }

    .zoom-button:hover {
      background: rgba(255,255,255,0.4);
    }

    .zoom-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .event-container {
      position: relative;
      width: 100vw;
      height: 100vh;
      max-width: 1920px;
      max-height: 1080px;
      aspect-ratio: 16/9;
      overflow: hidden;
      box-sizing: border-box;
    }

    @media (max-aspect-ratio: 16/9) {
      .event-container {
        width: 100vw;
        height: calc(100vw * 9 / 16);
      }
    }

    @media (min-aspect-ratio: 16/9) {
      .event-container {
        width: calc(100vh * 16 / 9);
        height: 100vh;
      }
    }

    .border-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 6px solid white;
      box-sizing: border-box;
      z-index: 1000;
      pointer-events: none;
    }

    .zoom-content {
      position: absolute;
      top: 6px;
      left: 6px;
      width: calc(100% - 12px);
      height: calc(100% - 12px);
      overflow: hidden;
    }

    .event {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      opacity: 0;
      z-index: 0;
      pointer-events: auto;
      transition: opacity 2s ease-in-out;
      background-repeat: no-repeat;
      box-sizing: border-box;
    }

    .event.visible {
      opacity: 1;
      z-index: 1;
    }

    .event::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: 0;
    }

    .event-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      top: 0;
      left: 0;
      z-index: 1;
      transform-origin: 5.2% 44.4%;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding-left: 5.2%;
      padding-bottom: 9.3%;
      box-sizing: border-box;
      gap: clamp(0.5rem, 2vw, 2rem);
    }

    .event-date {
      max-width: 52%;
      font-size: clamp(0.75rem, 2.25vw, 2.25rem);
      font-weight: 100;
      font-style: italic;
      line-height: 1;
      opacity: 0.9;
      color: #ccc;
      letter-spacing: 0.02em;
    }

    .event-title {
      max-width: 52%;
      font-size: clamp(2rem, 7.5vw, 7.5rem);
      font-weight: bold;
      line-height: 1;
      opacity: 1.0;
      color: #ccc;
      word-break: keep-all;
      overflow-wrap: break-word;
    }

    .event-description {
      max-width: 72.9%;
      font-size: clamp(1rem, 3.2vw, 3.2rem);
      line-height: 1;
      opacity: 0.9;
      color: #ccc;
    }

    .event-time {
      font-size: clamp(0.8rem, 2.8vw, 2.8rem);
      color: #ccc;
      opacity: 0.9;
      line-height: 1.2;
    }

    #loadingSpinner {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 2rem;
      font-family: sans-serif;
    }

    .emoji-eye {
      display: inline-block;
      width: 1em;
      height: auto;
      vertical-align: middle;
      max-width: 1em;
      max-height: 1em;
      object-fit: contain;
      line-height: 1;
    }

    .no-break-look {
      white-space: nowrap !important;
      display: inline-block;
      word-break: keep-all;
      overflow-wrap: normal;
    }

    #clock {
      position: absolute;
      top: 10%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: 6rem;
      opacity: 1.0;
      color: #ccc;
      z-index: 9999;
      font-family: "gill-sans-nova-condensed", sans-serif;
      font-weight: lighter;
    }
  </style>
</head>
<body>

  <div id="loadingSpinner">Loading events…</div>

  <div class="event-container" id="eventContainer">
    <div class="border-overlay"></div>
    <div id="clock"></div>
    <div class="zoom-content" id="zoomContent"></div>
  </div>

  <div id="zoom-controls">
    <button class="zoom-button" onclick="location.reload()" title="Reload">←</button>
    <button class="zoom-button" onclick="nextEvent()" title="Next event">→</button>
    <button class="zoom-button" onclick="changeZoom(-0.1)" title="Zoom out">−</button>
    <button class="zoom-button" onclick="changeZoom(0.1)" title="Zoom in">+</button>
    <button class="zoom-button" id="linkBtn" onclick="openCurrentEventLink()" title="Open event page">↗</button>
    <button class="zoom-button" id="saveBtn" onclick="saveAsPng()" title="Save as PNG"><span style="font-size: 1.5rem;">⬇</span></button>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <script>
    let zoomLevel = 1;
    let currentEventIndex = 0;
    let allEvents = [];

    function changeZoom(delta) {
      zoomLevel = Math.min(Math.max(zoomLevel + delta, 0.5), 2);
      const overlays = document.querySelectorAll('.event-overlay');
      overlays.forEach(overlay => {
        overlay.style.transform = `scale(${zoomLevel})`;
      });
    }

    function nextEvent() {
      if (allEvents.length === 0) return;
      const current = document.querySelector('.event.visible');
      if (current) current.classList.remove('visible');
      currentEventIndex = (currentEventIndex + 1) % allEvents.length;
      allEvents[currentEventIndex].classList.add('visible');
      updateLinkButton();
    }

    function previousEvent() {
      if (allEvents.length === 0) return;
      const current = document.querySelector('.event.visible');
      if (current) current.classList.remove('visible');
      currentEventIndex = (currentEventIndex - 1 + allEvents.length) % allEvents.length;
      allEvents[currentEventIndex].classList.add('visible');
      updateLinkButton();
    }

    function openCurrentEventLink() {
      const current = allEvents[currentEventIndex];
      const url = current?.dataset?.link;
      if (url) {
        window.open(url, '_blank');
      }
    }

    function updateLinkButton() {
      const btn = document.getElementById('linkBtn');
      const current = allEvents[currentEventIndex];
      const url = current?.dataset?.link;
      btn.disabled = !url;
      btn.title = url ? `Open event page: ${url}` : 'No link available';
    }

    // Logitech presenter remote + keyboard navigation
    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowRight' || e.key === 'PageDown') {
        e.preventDefault();
        nextEvent();
      } else if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
        e.preventDefault();
        location.reload();
      }
    });

    function parseEventTime(timeString) {
      try {
        const dateMatch = timeString.match(/(\w+)\s+(\d{1,2}),\s+(\d{4})/);
        let eventDate = new Date();
        if (dateMatch) {
          const monthName = dateMatch[1];
          const day = parseInt(dateMatch[2]);
          const year = parseInt(dateMatch[3]);
          const monthMap = {
            'January': 0, 'February': 1, 'March': 2, 'April': 3, 'May': 4, 'June': 5,
            'July': 6, 'August': 7, 'September': 8, 'October': 9, 'November': 10, 'December': 11
          };
          const month = monthMap[monthName];
          eventDate = new Date(year, month, day);
          console.log('Parsed date from:', timeString, '→', eventDate);
          return eventDate;
        }
        return null;
      } catch (e) {
        console.error('Error parsing time:', e);
        return null;
      }
    }

    function processTitleWithEyes(title) {
      let processedTitle = title
        .replace(/L👀k:/g, '<span class="no-break-look">L<img src="https://raw.githubusercontent.com/CU4thSpace/EVENTS/main/emoji-eyes.png" alt="👀" class="emoji-eye">k:</span>')
        .replace(/L👀K:/g, '<span class="no-break-look">L<img src="https://raw.githubusercontent.com/CU4thSpace/EVENTS/main/emoji-eyes.png" alt="👀" class="emoji-eye">K:</span>')
        .replace(/L👀k/g,  '<span class="no-break-look">L<img src="https://raw.githubusercontent.com/CU4thSpace/EVENTS/main/emoji-eyes.png" alt="👀" class="emoji-eye">k</span>')
        .replace(/L👀K/g,  '<span class="no-break-look">L<img src="https://raw.githubusercontent.com/CU4thSpace/EVENTS/main/emoji-eyes.png" alt="👀" class="emoji-eye">K</span>');
      processedTitle = processedTitle.replace(/:\s+/g, ':<br>');
      return processedTitle;
    }

    async function fetchAndDisplayEvents() {
      const response = await fetch('https://www.concordia.ca/content/concordia/en/next-gen/4th-space/programming/RSSCAL/_jcr_content/content-main/grid_container_671899525/grid-container-parsys/events_list.xml', {
        cache: 'no-store'
      });
      const text = await response.text();
      const parser = new DOMParser();
      const xml = parser.parseFromString(text, 'application/xml');
      const items = Array.from(xml.querySelectorAll('item'));

      const zoomContent = document.getElementById('zoomContent');
      zoomContent.innerHTML = '';

      const imagePromises = [];
      const eventDivs = [];

      items.forEach(item => {
        const title = item.querySelector('title')?.textContent || 'Untitled';
        const descriptionRaw = item.querySelector('description')?.textContent || '';

        // Grab the RSS item link — try <link> first, then <guid>
        const linkNode = item.querySelector('link');
        // <link> is often a text node sibling rather than a real element in RSS;
        // fall back to nextSibling text or guid if querySelector returns nothing useful
        let itemLink = '';
        if (linkNode && linkNode.textContent.trim()) {
          itemLink = linkNode.textContent.trim();
        } else {
          const guid = item.querySelector('guid');
          if (guid && guid.textContent.trim()) {
            itemLink = guid.textContent.trim();
          }
        }

        const tempDiv = document.createElement('div');
        tempDiv.innerHTML = descriptionRaw;
        const img = tempDiv.querySelector('img');
        const imageUrl = img ? img.src : 'https://via.placeholder.com/300';

        const descTime = tempDiv.querySelector('p')?.textContent.trim() || '';
        let eventDate = parseEventTime(descTime);

        if (!eventDate) {
          const pubDate = item.querySelector('pubDate')?.textContent;
          if (pubDate) {
            eventDate = new Date(pubDate);
          } else {
            eventDate = new Date();
          }
        }

        const eventDiv = document.createElement('div');
        eventDiv.className = 'event';
        eventDiv.style.backgroundImage = `url(${imageUrl})`;

        // Store the RSS link on the element for easy retrieval later
        if (itemLink) {
          eventDiv.dataset.link = itemLink;
        }

        const overlay = document.createElement('div');
        overlay.className = 'event-overlay';

        const dateDiv = document.createElement('div');
        dateDiv.className = 'event-date';
        const options = { weekday: 'long', month: 'long', day: 'numeric' };
        dateDiv.textContent = eventDate.toLocaleDateString('en-US', options);
        overlay.appendChild(dateDiv);

        const maxLength = 25;
        const titleDiv = document.createElement('div');
        titleDiv.className = 'event-title';
        titleDiv.innerHTML = processTitleWithEyes(title);
        if (title.length > maxLength) {
          const scale = Math.max(0.7, maxLength / title.length);
          titleDiv.style.fontSize = `clamp(${2 * scale}rem, ${7.5 * scale}vw, ${7.5 * scale}rem)`;
        }

        overlay.appendChild(titleDiv);
        eventDiv.appendChild(overlay);
        zoomContent.appendChild(eventDiv);
        eventDivs.push(eventDiv);

        const imgLoader = new Image();
        const imgPromise = new Promise(resolve => {
          imgLoader.onload = resolve;
          imgLoader.onerror = resolve;
          imgLoader.src = imageUrl;
        });
        imagePromises.push(imgPromise);
      });

      await Promise.all(imagePromises);
      document.getElementById('loadingSpinner').style.display = 'none';

      allEvents = eventDivs;
      currentEventIndex = 0;
      if (eventDivs.length > 0) {
        eventDivs[0].classList.add('visible');
      }

      const overlays = document.querySelectorAll('.event-overlay');
      overlays.forEach(overlay => {
        overlay.style.transform = `scale(${zoomLevel})`;
      });

      // Reflect link availability for the first event
      updateLinkButton();
    }

    async function saveAsPng() {
      const saveBtn = document.getElementById('saveBtn');
      const controls = document.getElementById('zoom-controls');
      const clock = document.getElementById('clock');

      saveBtn.disabled = true;
      saveBtn.textContent = '…';

      controls.style.display = 'none';
      clock.style.display = 'none';

      try {
        const container = document.getElementById('eventContainer');

        const canvas = await html2canvas(container, {
          useCORS: true,
          allowTaint: false,
          scale: 2,
          backgroundColor: '#111',
          logging: false,
          imageTimeout: 10000,
        });

        const visibleEvent = allEvents[currentEventIndex];
        const titleText = visibleEvent?.querySelector('.event-title')?.innerText || 'event';
        const safeName = titleText
          .replace(/[^a-z0-9]/gi, '_')
          .replace(/_+/g, '_')
          .toLowerCase()
          .slice(0, 50);

        const link = document.createElement('a');
        link.download = `4thspace_${safeName}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      } catch (err) {
        console.error('PNG export failed:', err);
        alert('Export failed — see console for details.');
      } finally {
        controls.style.display = '';
        clock.style.display = '';
        saveBtn.disabled = false;
        saveBtn.textContent = '⬇';
      }
    }

    fetchAndDisplayEvents();
    setInterval(fetchAndDisplayEvents, 6 * 60 * 60 * 1000);

    // Clock
    function updateClock() {
      const now = new Date();
      const hours   = String(now.getHours()).padStart(2, '0');
      const minutes = String(now.getMinutes()).padStart(2, '0');
      const seconds = String(now.getSeconds()).padStart(2, '0');
      document.getElementById('clock').textContent = `${hours}:${minutes}:${seconds}`;
    }

    setInterval(updateClock, 1000);
    updateClock();
  </script>

</body>
</html>
